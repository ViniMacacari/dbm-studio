<section class="player-editor-page" *ngIf="draft as player; else missingPlayer">
  <header class="player-editor-header">
    <button type="button" class="back-button" (click)="closeEditor.emit()">Back</button>
    <div class="player-title">
      <span class="player-kicker">Player {{ player.playerId }}</span>
      <h2>{{ player.displayName }}</h2>
      <div class="player-meta">
        <span *ngIf="player.birthDateIso">{{ player.birthDateIso }}</span>
        <span *ngIf="player.age !== undefined">{{ player.age }} years</span>
        <span *ngIf="player.nationalityName">{{ player.nationalityName }}</span>
        <span>names: {{ player.nameSource }}</span>
        <span *ngIf="!player.namesAvailable">No editedplayernames table</span>
      </div>
    </div>
    <div class="editor-actions">
      <button type="button" class="apply-button" (click)="apply()">Apply</button>
      <button type="button" class="secondary-apply-button" (click)="applyAndBack()">Apply and Back</button>
      <button type="button" class="secondary-apply-button" [disabled]="!canSaveDatabase" (click)="applyAndSave()">Apply and Save</button>
    </div>
  </header>

  <nav class="editor-tabs" aria-label="Player editor tabs">
    <button type="button" [class.active]="activeTab === 'identity'" (click)="setTab('identity')">Identity</button>
    <button
      *ngFor="let section of sections; trackBy: trackBySection"
      type="button"
      [class.active]="activeTab === section.id"
      (click)="setTab(section.id)"
    >
      {{ section.title }}
    </button>
  </nav>

  <div class="player-editor-body">
    <section class="editor-panel" *ngIf="activeTab === 'identity'">
      <div class="name-grid">
        <label class="field-block">
          <span>First name</span>
          <input type="text" [(ngModel)]="player.names.firstname" [disabled]="!player.namesAvailable" />
          <small>ID {{ player.nameIds.firstname || '-' }}</small>
        </label>
        <label class="field-block">
          <span>Surname</span>
          <input type="text" [(ngModel)]="player.names.surname" [disabled]="!player.namesAvailable" />
          <small>ID {{ player.nameIds.surname || '-' }}</small>
        </label>
        <label class="field-block">
          <span>Common name</span>
          <input type="text" [(ngModel)]="player.names.commonname" [disabled]="!player.namesAvailable" />
          <small>ID {{ player.nameIds.commonname || '-' }}</small>
        </label>
        <label class="field-block">
          <span>Jersey name</span>
          <input type="text" [(ngModel)]="player.names.playerjerseyname" [disabled]="!player.namesAvailable" />
          <small>ID {{ player.nameIds.playerjerseyname || '-' }}</small>
        </label>
      </div>

      <div class="editor-grid">
        <label class="field-block" *ngFor="let field of player.identityFields; trackBy: trackByField">
          <span>{{ field.label }}</span>
          <input
            [type]="field.inputType"
            [(ngModel)]="field.value"
            [readonly]="field.readonly"
            [min]="field.min"
            [max]="field.max"
          />
          <small *ngIf="field.relation">{{ field.relation }}</small>
        </label>
      </div>
    </section>

    <section class="editor-panel" *ngFor="let section of sections; trackBy: trackBySection" [class.hidden]="activeTab !== section.id">
      <div class="editor-grid">
        <label class="field-block" *ngFor="let field of section.fields; trackBy: trackByField">
          <span>{{ field.label }}</span>
          <input
            [type]="field.inputType"
            [(ngModel)]="field.value"
            [readonly]="field.readonly"
            [min]="field.min"
            [max]="field.max"
          />
          <small *ngIf="field.relation">{{ field.relation }}</small>
        </label>
      </div>
    </section>
  </div>

  <div class="editor-footer" [class.error]="lastAppliedTone === 'error'">
    <span>{{ lastApplied }}</span>
  </div>
</section>

<ng-template #missingPlayer>
  <section class="player-editor-page">
    <div class="empty-state">
      <strong>Player row not found.</strong>
    </div>
  </section>
</ng-template>
