<ng-container [ngSwitch]="viewMode">
  <section class="home-screen" *ngSwitchCase="'home'">
    <div class="home-panel">
      <div class="brand home-brand">
        <div class="brand-mark">DBM</div>
        <div>
          <h1>{{ appName }}</h1>
          <p>{{ projectSubtitle }}</p>
          <span class="app-version">v{{ appVersion }}</span>
        </div>
      </div>

      <div class="home-options" aria-label="Editor mode">
        <button type="button" class="home-option simple-option" (click)="openDatabase()">
          <span class="option-index">01</span>
          <span class="option-copy">
            <strong>Simple DB Editor</strong>
            <small>DB + XML</small>
          </span>
        </button>
        <button type="button" class="home-option full-option" (click)="openDatabaseWithLocalization()">
          <span class="option-index">02</span>
          <span class="option-copy">
            <strong>Full DB Editor</strong>
            <small>DB + XML + LOC</small>
          </span>
        </button>
        <button type="button" class="home-option compdata-option disabled">
          <span class="option-index">03</span>
          <span class="option-copy">
            <strong>Compdata Editor</strong>
            <small>TXT + LOC</small>
          </span>
        </button>
      </div>
    </div>
  </section>

  <app-compdata-editor-page *ngSwitchCase="'compdata'" (showHome)="showLauncher()" (statusChanged)="setStatus($event)"></app-compdata-editor-page>

  <section class="launcher-screen" *ngSwitchCase="'launcher'">
    <header class="screen-header">
      <div class="brand compact-brand">
        <div class="brand-mark">DBM</div>
        <div>
          <h1>{{ appName }}</h1>
          <p>{{ projectSubtitle }}</p>
        </div>
      </div>
      <div class="screen-actions">
        <button type="button" (click)="openDatabase()">DB</button>
        <button type="button" [disabled]="!canSaveDatabase" (click)="saveProject()">Save</button>
      </div>
    </header>

    <main class="launcher-main">
      <div class="choice-grid">
        <button type="button" class="choice-card" (click)="openTableWorkspace()">
          <span class="choice-title">Table Editor</span>
          <span class="choice-meta">{{ tableCount }} tables</span>
        </button>
        <button type="button" class="choice-card" [disabled]="!canUseModules" (click)="openModulesWorkspace()">
          <span class="choice-title">Modules</span>
          <span class="choice-meta">{{ playersCount }} players / {{ teamsCount }} teams / {{ leaguesCount }} leagues</span>
        </button>
      </div>

      <div class="module-preview-grid">
        <button type="button" class="module-card active" [disabled]="!canUsePlayerModule"
          (click)="openModulesWorkspace('players')">
          <span>Players</span>
          <strong>{{ playersCount }}</strong>
        </button>
        <button type="button" class="module-card active" [disabled]="!canUseTeamModule"
          (click)="openModulesWorkspace('teams')">
          <span>Teams</span>
          <strong>{{ teamsCount }}</strong>
        </button>
        <button type="button" class="module-card active" [disabled]="!canUseLeagueModule"
          (click)="openModulesWorkspace('leagues')">
          <span>Leagues</span>
          <strong>{{ leaguesCount }}</strong>
        </button>
        <button type="button" class="module-card active" [disabled]="!canUseTransferModule"
          (click)="openModulesWorkspace('transfers')">
          <span>Transfers</span>
          <strong>{{ transfersCount }}</strong>
        </button>
        <button type="button" class="module-card disabled" disabled>
          <span>Stadiums</span>
          <strong>Locked</strong>
        </button>
      </div>
    </main>

    <footer class="screen-footer">
      <span>{{ statusLine }}</span>
    </footer>
  </section>

  <app-table-workspace *ngSwitchCase="'table'" [project]="project" 
    (showHome)="showLauncher()" 
    (showModules)="openModulesWorkspace()" 
    (openPlayer)="openPlayerFromTable($event)" 
    (statusChanged)="setStatus($event)">
  </app-table-workspace>

  <app-modules-workspace *ngSwitchCase="'modules'" class="modules-screen" [project]="project" 
    (showHome)="showLauncher()" 
    (showTable)="openTableWorkspace()" 
    (openPlayer)="openPlayerFromModule($event)" 
    (openTeam)="openTeamFromModule($event)" 
    (openLeague)="openLeagueFromModule($event)" 
    (saveRequest)="saveProject()" 
    (statusChanged)="setStatus($event)">
  </app-modules-workspace>

  <section class="editor-screen" *ngSwitchCase="'playerEditor'">
    <app-player-editor-page *ngIf="project as loadedProject" [project]="loadedProject" [rowIndex]="playerEditorRowIndex"
      [isNew]="playerEditorIsNew"
      [canSaveDatabase]="canSaveDatabase" (closeEditor)="closePlayerEditor()" (applied)="onPlayerEditorApplied($event)"
      (appliedAndSave)="onPlayerEditorAppliedAndSave($event)"></app-player-editor-page>
  </section>

  <section class="editor-screen" *ngSwitchCase="'teamEditor'">
    <app-team-editor-page *ngIf="project as loadedProject" [project]="loadedProject" [rowIndex]="teamEditorRowIndex"
      [isNew]="teamEditorIsNew"
      [canSaveDatabase]="canSaveDatabase" (closeEditor)="closeTeamEditor()" (applied)="onTeamEditorApplied($event)"
      (appliedAndSave)="onTeamEditorAppliedAndSave($event)"></app-team-editor-page>
  </section>

  <section class="editor-screen" *ngSwitchCase="'leagueEditor'">
    <app-league-editor-page *ngIf="project as loadedProject" [project]="loadedProject" [rowIndex]="leagueEditorRowIndex"
      [isNew]="leagueEditorIsNew"
      [canSaveDatabase]="canSaveDatabase" (closeEditor)="closeLeagueEditor()" (applied)="onLeagueEditorApplied($event)"
      (appliedAndSave)="onLeagueEditorAppliedAndSave($event)"></app-league-editor-page>
  </section>
</ng-container>

<app-visual-dependency-modal [(visible)]="visualDependencyModalVisible"></app-visual-dependency-modal>

<div class="toast" [class.hidden]="!toastService.visible" [class.warn]="toastService.tone === 'warn'"
  [class.error]="toastService.tone === 'error'">
  {{ toastService.message }}
</div>

<div class="loading-overlay" *ngIf="loadingService.active">
  <div class="loading-box">
    <div class="spinner"></div>
    <strong>{{ loadingService.title }}</strong>
    <span>{{ loadingService.detail }}</span>
    <div class="loading-progress" *ngIf="loadingService.percent !== undefined">
      <div class="loading-progress-bar" [style.width.%]="loadingService.percent"></div>
    </div>
    <small *ngIf="loadingService.percent !== undefined">{{ loadingService.percent }}% {{ loadingService.progressLabel }}</small>
  </div>
</div>
