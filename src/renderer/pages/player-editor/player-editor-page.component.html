<section class="player-editor-page" *ngIf="draft as player; else missingPlayer">
  <header class="player-editor-header">
    <button type="button" class="back-button" (click)="closeEditor.emit()">Back</button>
    <div class="player-miniface" [class.placeholder]="minifaceSource !== 'player'">
      <img *ngIf="minifaceDataUrl" [src]="minifaceDataUrl" [alt]="player.displayName" />
    </div>
    <div class="player-title">
      <span class="player-kicker">Player {{ player.playerId }}</span>
      <h2>{{ player.displayName }}</h2>
      <div class="player-meta">
        <span *ngIf="player.birthDateIso">{{ player.birthDateIso }}</span>
        <span *ngIf="player.age !== undefined">{{ player.age }} years</span>
        <span *ngIf="player.nationalityName">{{ player.nationalityName }}</span>
        <span>names: {{ player.nameSource }}</span>
        <span *ngIf="!player.namesAvailable">No editedplayernames table</span>
      </div>
    </div>
    <div class="editor-actions">
      <button type="button" class="secondary-apply-button" *ngIf="isNew" (click)="importModalVisible = true">Import Real Player</button>
      <button type="button" class="apply-button" (click)="apply()">Apply</button>
      <button type="button" class="secondary-apply-button" (click)="applyAndBack()">Apply and Back</button>
      <button type="button" class="secondary-apply-button" [disabled]="!canSaveDatabase" (click)="applyAndSave()">Apply
        and Save</button>
    </div>
  </header>

  <nav class="editor-tabs" aria-label="Player editor tabs">
    <button type="button" [class.active]="activeTab === 'identity'" (click)="setTab('identity')">Identity</button>
    <button *ngFor="let section of sections; trackBy: trackBySection" type="button"
      [class.active]="activeTab === section.id" (click)="setTab(section.id)">
      {{ section.title }}
    </button>
  </nav>

  <div class="player-editor-body">
    <section class="editor-panel" *ngIf="activeTab === 'identity'">
      <div class="name-grid">
        <label class="field-block">
          <span>First name</span>
          <input type="text" [(ngModel)]="player.names.firstname" [disabled]="!player.namesAvailable" />
          <small>ID {{ player.nameIds.firstname || '-' }}</small>
        </label>
        <label class="field-block">
          <span>Surname</span>
          <input type="text" [(ngModel)]="player.names.surname" [disabled]="!player.namesAvailable" />
          <small>ID {{ player.nameIds.surname || '-' }}</small>
        </label>
        <label class="field-block">
          <span>Common name</span>
          <input type="text" [(ngModel)]="player.names.commonname" [disabled]="!player.namesAvailable" />
          <small>ID {{ player.nameIds.commonname || '-' }}</small>
        </label>
        <label class="field-block">
          <span>Jersey name</span>
          <input type="text" [(ngModel)]="player.names.playerjerseyname" [disabled]="!player.namesAvailable" />
          <small>ID {{ player.nameIds.playerjerseyname || '-' }}</small>
        </label>
      </div>

      <div class="editor-grid">
        <label class="field-block" *ngFor="let field of player.identityFields; trackBy: trackByField">
          <span>{{ field.label }}</span>
          <app-search-list *ngIf="field.inputType === 'nation'; else identityInput" [options]="nationOptions"
            [(value)]="field.value" [disabled]="!!field.readonly" placeholder="Search country"></app-search-list>
          <ng-template #identityInput>
            <app-input-list *ngIf="field.inputType === 'position'; else defaultIdentityInput"
              [options]="positionOptions" [(value)]="field.value" [disabled]="!!field.readonly"
              placeholder="Select position"></app-input-list>
            <ng-template #defaultIdentityInput>
              <input [type]="field.inputType" [(ngModel)]="field.value" [readonly]="field.readonly" [min]="field.min"
                [max]="field.max" />
            </ng-template>
          </ng-template>
          <small *ngIf="field.relation">{{ field.relation }}</small>
        </label>
      </div>
    </section>

    <section class="editor-panel" *ngFor="let section of sections; trackBy: trackBySection"
      [class.hidden]="activeTab !== section.id">
      <div class="editor-grid">
        <ng-container *ngFor="let field of section.fields; trackBy: trackByField">
          <label class="field-block" *ngIf="!(player.hasHighQualityHead && (field.column === 'hairtypecode' || field.column === 'facialhairtypecode'))">
            <span>{{ field.label }}</span>
            <app-search-list *ngIf="field.inputType === 'nation'; else sectionInput" [options]="nationOptions"
              [(value)]="field.value" [disabled]="!!field.readonly" placeholder="Search country"></app-search-list>
            <ng-template #sectionInput>
              <app-input-list *ngIf="field.inputType === 'position' || field.column === 'bodytypecode'; else defaultSectionInput"
                [options]="field.column === 'bodytypecode' ? bodyTypeOptions : positionOptions"
                [(value)]="field.value" [disabled]="!!field.readonly"
                [placeholder]="field.column === 'bodytypecode' ? 'Select body type' : 'Select position'">
              </app-input-list>
              <ng-template #defaultSectionInput>
                <div class="input-with-action" *ngIf="field.column === 'hairtypecode' || field.column === 'facialhairtypecode' || field.column === 'skintonecode'; else standardInput">
                  <input [type]="field.inputType" [(ngModel)]="field.value" [readonly]="field.readonly" [min]="field.min"
                    [max]="field.max" />
                  <button type="button" class="magnifier-action-btn" title="Select visual asset"
                    (click)="openPicker(field.column === 'hairtypecode' ? 'hairs' : field.column === 'facialhairtypecode' ? 'beards' : 'skin-tones', field)">
                    <span class="magnifier-icon">🔍</span>
                  </button>
                </div>
                <ng-template #standardInput>
                  <input [type]="field.inputType" [(ngModel)]="field.value" [readonly]="field.readonly" [min]="field.min"
                    [max]="field.max" />
                </ng-template>
              </ng-template>
            </ng-template>
            <small *ngIf="field.relation">{{ field.relation }}</small>
          </label>
        </ng-container>
      </div>
    </section>
  </div>

  <div class="editor-footer" [class.error]="lastAppliedTone === 'error'">
    <span>{{ lastApplied }}</span>
  </div>

  <app-visual-asset-picker [(visible)]="pickerVisible" [type]="pickerType" [currentValue]="pickerTargetField?.value ?? ''" (selected)="onPickerSelected($event)"></app-visual-asset-picker>
  <app-transfermarkt-player-import-modal
    [visible]="importModalVisible"
    (close)="importModalVisible = false"
    (imported)="onPlayerImported($event)"
  ></app-transfermarkt-player-import-modal>
</section>

<ng-template #missingPlayer>
  <section class="player-editor-page">
    <div class="empty-state">
      <strong>Player row not found.</strong>
    </div>
  </section>
</ng-template>
